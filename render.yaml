services:
  - type: web
    name: renovared-backend
    env: node
    rootDir: backend
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: NODE_ENV
        value: production
      - key: PUBLIC_API_URL
        fromService:
          type: web
          name: renovared-backend
          property: url
      - key: FRONTEND_URL
        fromService:
          type: web
          name: renovared-frontend
          property: url
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: DB_SSL
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: ACCESS_TOKEN_MP
        sync: false
      - key: MP_ACCESS_TOKEN
        sync: false
      - key: MERCADOPAGO_ACCESS_TOKEN
        sync: false
      - key: MP_ACCESS_TOKEN_BY_USER
        sync: false
      - key: MP_WEBHOOK_URL
        sync: false
      - key: PAYMENT_HOLDER
        value: RenovaRed

  - type: web
    name: renovared-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build:render
    staticPublishPath: dist/renovared/browser
    pullRequestPreviewsEnabled: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: NODE_VERSION
        value: 22.14.0
      - key: API_URL
        fromService:
          type: web
          name: renovared-backend
          property: url
      - key: GOOGLE_CLIENT_ID
        sync: false
